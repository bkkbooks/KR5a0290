front:
  text: 清微丹訣芥八
  hash: sha256:15fd69a67d91db539ba4395c2d7bb909303432586c4914904aedbc4736ea4d63
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0290_HFL_000-001a, image: hfl/0134/0134-090.png}
body:
  text: 清微隱真合道章第一上藥三品神與氣精保精生氣煉氣生神形煉其神則可以留形住世而形者神氣宅也是故身安者其精固精固則其氣盈氣盈則其神全神全故長生若乃精虛則氣竭氣竭則神遷神遷則死矣故不死者煉精成氣煉氣成神煉神合道能事畢矣道法云乎哉全形者即煉精之謂也須其六根斷絶一念真純以時入室端坐凝神定息良久即鞭赤龍上擊七十二天龍則離火自降坎水自升往來結於黃庭伏其真氣煉其陰邪冷汗自出如此五遍合周天三百六十五之數陽光遍體為純陽則全形氣之道宿殃自解萬病消除不憎不嫉不欲不淫然後煉氣合神也夫煉氣者冥心定息元寂綿綿神室內守氣入丹田臍中動息綿綿續續兩手抱臍丹火溫溫六根定安物我兩忘乃煉氣之道行無狂步言無疾聲然後煉神合道也夫煉神者入室端坐神氣既息不出不入心無二用一念無著視而不見聽而不聞氣住而為息神入而成胎昏昏默默杳杳冥冥意遊長空見一景物光如金橘非內非外守其物矣如月之光如鏡之影操之存之初不相離恍惚自然大如車輪形見其神神見其形形神相雜心生踴躍其光自散如日月照虛空形神俱妙與道合真矣神歸體則真神自靈若守千日之功離形飛升百日之功超凡入聖不樞不機其理自然也入室功夫章第二此竅非凡竅乾坤共合成名為神氣穴內有坎離精心下腎上處肝西肺左中非腸非胃脘一氣自流通蓋此竅世傳臍下一寸三分者非也正對臍上一寸三分者是也所謂臍之後腎之前大腸之左小腸之右其中空洞意到即開乃乾父之精坤母之血結胎之黃房也名為神氣穴中藏水火精其中左有火竅居常晝夜不拘時三五七次或逐時趺坐左足上右足下瞑目定時凝神於混沌之中不出運赤龍上擊七十二天則真火自降靈泉上湧即以舌柱上腭俟華池水滿盥漱五七通咽下其中想見一氣混融靈光浩蕩或奏師煉神持呪述事如此隨意行持即用離形去知物我兩忘如此用工三七日或一月以手按竅兩傍如火之熱覺左右擲擲而動是其驗者所謂收為胎息守為竅也半年一載勤而不怠宿殃悉去向上工夫金丹大道不外是矣臨壇召合章第三瞑目凝神聚氣於混沌之中不出不入一氣七遍劍訣火鍊真文咽下祖宫過三關升入天門意遊長空張目直視見三字金光迸出照天燭地放出號令萬真稟行發用章第四雷囦真人曰耳熱生風眼黑生雲腹中震動即雷鳴汗流大小皆為雨目眩之時便火生入息靜定良久神息既調直待內境不出外境不入但覺身非我有天地虛然入定光中或見祖師出令雷霆萬真隨行意欲五事皆集丁寧發遣次復收斂運一氣七遍之妙近視天氣下降地氣上騰蒸山煮海交合混沌於黃中釀成五事臨壇之際撥動關捩隨竅而發也耳熱則雙手玉文運起從腰腎間上升至耳一拂而上即南風下北風前東而後西也眼黑即如上運升以目光直視長空散雲瀝黑目動而止腹霆動即以局運從腰間上升至耳以局提提耳三按而發汗流不止或大小迸急則以身振動竅穴俱開大雨如注目眩之時即如上運升以目閃左則左右則右已上關捩在大靜定中所謂無中生有不可以為無心作不可以有心求平日工夫純熟至此自然而神不知其所以神祈禱芟邪應如桴鼓此玄之外更無玄矣千金不傳得此寶之坐功睡法玄化之門在兩腎中間名曰大海又為弱水其為丹田左青右白上赤下黑中黃男以藏精女以藏血乃孕育之地為人之根本五氣之元始也中有神龜呼吸元氣流行則為風雨激搏則為雷霆通貫四肢無所不至左右腎為日月之精華為龍虎之變化前臍則為崑崙為大山為淵為五城中有真人即五帝也五城之外有八使即八卦大神人使并大一為九卿上有十三重樓樓中十二子并三焦神為二十七大夫又并四肢神為八十一元士太一至真人居臍中主身中一萬三千神將郊在頭上腦户中廟在項後頂上社在脾左端稷在大腸窮處風伯在臍輪下右傍雨師在小腸盡處雷公在大海右腎電母在八門右上弱水之顚一身之中神宫凡三十有六各有官僚宰輔皆受命於太一真人凡人當睡法守之集身神斬三尸勘六賊方可混合造化窺測乾坤天地雖大皆在吾身中也斂身趺坐目視鼻心守玄牝然後定精神形體氣神氣相守命神念之所至運氣神自然而然降心神專至誠一呼集身中之神時以眼視鼻端就觀祖府靜而又靜一氣七遍泰珠造化頌曰一法生萬法萬法歸一無太上云如於內毫釐有差天壤異處功有等級達無先後後學詳之勿為易得決欲行之此法乃萬法之關津三洞之樞機當頤神養氣煉體凝精屏雜念絶嗜欲斬三尸舍一氣內念莫作外念莫生純一守素正定無為方可安手頓腳敬而行之保命長生先以兩手大煞運上頂漱一口三口咽下第三口漱了使津液滿口前二口乃五味所生稠唾故取第三口金液還丹是也以舌捲下藏味凝香二穴關閉目內觀泥丸存五色雲氣却平坐左手覆右手左足疊右足存思中一神通萬神俱通一竅通九竅齊通罡我稟陰陽二氣出則轟天震地神歸山嶽摧崩煞去精邪粉碎法中之要非專於符非泥於呪先以我之正氣合將之靈法之繫在乎斗斗之所統參於正罡乃四正之氣中正之謂也氣罡乃斗之煞也以天之斗隨身之轉罡亦如之然我之斗我之罡在於何處須明我之罡我之斗三合用之無不驗無不通者也凝則竅妙可見動則運默可知神氣清明朗如秋月靜中之妙法中之玄其默能知將本居天合之何也但居二斗之中定光之內吾以神氣相貫合將為將則萬病俱消萬邪賔伏故德者道之符誠者法之本道無德不足為道法非誠不足言法守道者正正法化行循法無私將必聽役驅役法乃正己也道者守己也如此二事不虧一心不易雖王公大臣亦可坐伏此道之所以為法也今傳法時祖師所以江湖之姓遊天下為伎能徒有其名而無其實皆法以道行法亦法以法行法也遂使後學之人法俱不明何有於道心而悖道何有於法夫天不言而默運地不言而發生道不言而包羅法不言而靈應天以氣而降地以氣而升道以氣而為主法以氣而化天之將即地之神道之符即法之印入道從法先明天地之根次究神氣用天之默運則轟雷雨電春生秋煞變化無窮地之默載則果荄根苗發生長養厚載無量道之包羅上而天下而地中而人無所不包必如是然後可以明道可以行法是必正己誠意神氣沖和故道即法也法即道也天將守律地祇衛門元辰用事靈光常存可以驅邪可以治病可以達帝可以嘯命風雷可以斡旋造化初不必許多枝蔓惟正一字而已無所不達不可以道為門以法為户而生諸障恐神將為邪所使則無救也修真學道之士審此為戒行天地大造化總在一竅中人能知此竅萬法悉皆通中宫指玄之圖又名玄關一竅又名為玄化之門前對臍後對腎其白如綿其連如環方廣一寸二分一身之精粹皆聚於此在臍上約寸吸天河之水入我身中黃河水再運從夾脊雙關倒貫入符急用淡墨水得天地之中氣十五畫吸一口噀在符中乃為雲雨玄武水火龜蛇在玄武下敬以直內義以方外萬氣歸一氣萬神歸一神玄關一竅乃先天一氣此乃萬法英華金丹之樞紐在于靈寶謂之玄珠在于神霄謂之真王在于雷法謂之雷祖在于煉度謂之水火在于南極謂之圓光在于老君謂之法主在于符水謂之靈光此是真一之氣變化無量大神可降伏六天魔鬼可追九地精靈煉度亡靈以生天解釋多生罪咎此道法之至祕不宜輕泄即招天譴罪非輕也清微坐功凡入靜室跣足端身正坐兩手握固萬緣放下定心如在太極混沌未判之先虛空圓光之內又如在圓光一竅之中混沌一同身心俱無澄澄湛湛普照十方天地莫測鬼神莫知早晚靜坐亦然常要運用內煉陰陽雷神右法先存坎離上升自泥丸宫出成二斗混合妙在其中矣坎離混合出泥丸二斗相交照項前心火腎水隨升降璇璣一出在兩邊煉得二帥不須言元始三合變自然須臾雷雨雱霈降化運千千萬萬年急晴用香亦可紙亦可符用朱書出筆向上祈晴四時俱用指坎餘則隨事按卦所指清微丹訣
